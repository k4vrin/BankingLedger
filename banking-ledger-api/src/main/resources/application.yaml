spring:
  application:
    name: banking-ledger
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: banking-ledger
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 30000
        request.timeout.ms: 10000
        max.in.flight.requests.per.connection: 5

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

banking-ledger:
  outbox:
    publisher:
      enabled: true
      batch-size: 50
      interval: 5s
  security:
    jwt:
      issuer: ${JWT_ISSUER:banking-ledger-local}
      audience: ${JWT_AUDIENCE:banking-ledger-api}
      secret: ${JWT_SECRET:local-development-secret-key-for-banking-ledger-phase-seven}
      clock-skew: ${JWT_CLOCK_SKEW:30s}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:0}
      allowed-cors-origins:
        - ${APP_CORS_ORIGIN:http://localhost:3000}

logging:
  pattern:
    correlation: "[%X{correlationId:-}] "
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p ${spring.application.name:} ${logging.pattern.correlation}%t %logger{36} - %msg%n"

kind: Application
