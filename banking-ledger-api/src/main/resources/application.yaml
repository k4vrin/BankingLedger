spring:
  application:
    name: banking-ledger
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

banking-ledger:
  security:
    jwt:
      issuer: ${JWT_ISSUER:banking-ledger-local}
      audience: ${JWT_AUDIENCE:banking-ledger-api}
      secret: ${JWT_SECRET:local-development-secret-key-for-banking-ledger-phase-seven}
      clock-skew: ${JWT_CLOCK_SKEW:30s}
      dev-token-ttl: ${JWT_DEV_TOKEN_TTL:1h}
      allowed-cors-origins:
        - ${APP_CORS_ORIGIN:http://localhost:3000}

logging:
  pattern:
    correlation: "[%X{correlationId:-}] "
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p ${spring.application.name:} ${logging.pattern.correlation}%t %logger{36} - %msg%n"
