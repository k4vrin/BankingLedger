spring:
  application:
    name: banking-ledger
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    correlation: "[%X{correlationId:-}] "
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p ${spring.application.name:} ${logging.pattern.correlation}%t %logger{36} - %msg%n"
