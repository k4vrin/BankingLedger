name: banking-ledger-dev

services:
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: banking-ledger-oracle-dev
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle_admin_password}
      APP_USER: ${DB_USERNAME:-ledger_dev}
      APP_USER_PASSWORD: ${DB_PASSWORD:-ledger_dev_password}
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    volumes:
      - oracle-dev-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: banking-ledger-cloudbeaver-dev
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      CLOUDBEAVER_DB_INITIAL_DATA: /opt/cloudbeaver/conf/initial-data.conf
    ports:
      - "${CLOUDBEAVER_PORT:-8978}:8978"
    volumes:
      - cloudbeaver-dev-data:/opt/cloudbeaver/workspace
      - ./cloudbeaver/conf/initial-data.conf:/opt/cloudbeaver/conf/initial-data.conf:ro

  kafka:
    image: apache/kafka:3.9.1
    container_name: banking-ledger-kafka-dev
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-dev-data:/var/lib/kafka/data

volumes:
  oracle-dev-data:
  cloudbeaver-dev-data:
  kafka-dev-data:
