name: banking-ledger-prod

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: banking-ledger-api:${APP_VERSION:-latest}
    container_name: banking-ledger-api-prod
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:oracle:thin:@oracle:1521/FREEPDB1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: banking-ledger-oracle-prod
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:?Set ORACLE_PASSWORD in .env}
      APP_USER: ${DB_USERNAME:?Set DB_USERNAME in .env}
      APP_USER_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - oracle-prod-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 90s
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: banking-ledger-cloudbeaver-prod
    profiles:
      - tools
    depends_on:
      oracle:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CLOUDBEAVER_PORT:-8978}:8978"
    volumes:
      - cloudbeaver-prod-data:/opt/cloudbeaver/workspace
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.1
    container_name: banking-ledger-kafka-prod
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-prod-data:/var/lib/kafka/data
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: banking-ledger-kafka-init-prod
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic banking-ledger.ledger-events --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic banking-ledger.account-events --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic banking-ledger.reconciliation-events --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor 1
    restart: "no"

volumes:
  oracle-prod-data:
  cloudbeaver-prod-data:
  kafka-prod-data:
